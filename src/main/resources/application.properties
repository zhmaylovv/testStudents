spring.application.name=testStudents
spring.datasource.url=${DB_ADDRESS}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.thymeleaf.cache=false

# Suppress TDLib native log spam (Client.cpp debug messages)
logging.level.it.tdlight=WARN

# Telegram userbot (env vars: TELEGRAM_API_ID, TELEGRAM_API_HASH, TELEGRAM_PHONE)
# Get API_ID and API_HASH at https://my.telegram.org
# Read interval: how often to auto-mark topics as read (minutes)
telegram.read.interval.minutes=3